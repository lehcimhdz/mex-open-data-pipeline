[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
  "E501",  # line length — handled by formatter
]
exclude = ["logs/", "plugins/"]

[tool.ruff.lint.isort]
known-first-party = ["utils"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
# Airflow internals are not fully typed; strict mode would generate too much noise
strict = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
